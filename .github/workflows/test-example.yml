name: Run Tests

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-structure-example-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-structure-example-
            ${{ runner.os }}-m2-

      - name: Build and test structure-example
        working-directory: structure-example
        run: |
          mvn clean test \
            -Dmaven.test.failure.ignore=false \
            --batch-mode

      - name: Publish Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: 'structure-example/**/target/surefire-reports/*.xml'

      - name: Generate Test Report
        if: always()
        run: |
          echo "=== Test Summary ==="
          find structure-example -name "TEST-*.xml" -exec echo "Found: {}" \; || echo "No test result files found"
