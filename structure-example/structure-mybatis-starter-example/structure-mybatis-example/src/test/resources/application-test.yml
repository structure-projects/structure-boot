spring:
  application:
    name: mybatis-example-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

structure:
  mybatis:
    plugin:
      over-write: true
      split: true
      generate-id-type: snowflake

server:
  port: 0

logging:
  level:
    org.springframework: WARN
    cn.structure: DEBUG
