spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://172.16.0.249:3306/oauth?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      database: 1
      password: 123456
      host: 172.16.0.249
  flyway:
    enabled: true
    clean-disabled: true
    table: flyway_schema_history
    out-of-order: false
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: true
    locations: classpath:db/migration

structure:
  log:
    aop:
      expression: execution(public * cn.structured.oauth.server.controller..*Controller.*(..))
      enable: true
  rpc:
    service-list:
      user-center:
        access-key: client_id
        secret-key: client_secret
        host: 127.0.0.1
        port: 18002
        auth-type: NONE
      user-center-basic:
        access-key: admin
        secret-key: password
        host: 127.0.0.1
        port: 18002
        auth-type: BASIC
      user-center-bearer:
        access-key: client_id
        secret-key: client_secret
        host: 127.0.0.1
        port: 18002
        auth-type: BEARER
        auth-host: 127.0.0.1
        auth-port: 18002
        auth-path: /oauth/token
        token-basic-auth: false
      user-center-bearer-basic:
        access-key: client_id
        secret-key: client_secret
        host: 127.0.0.1
        port: 18002
        auth-type: BEARER
        auth-host: 127.0.0.1
        auth-port: 18002
        auth-path: /oauth/token
        token-basic-auth: true

swagger:
  title: RPC示例 - OAuth2认证演示
  description: 演示多种认证方式（NONE/BASIC/BEARER）的RPC调用
  version: v1.0.1
server:
  port: 18002
